<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <!-- Reversed (white) logo for dark backgrounds — Fort Property Developments -->
  <g transform="translate(20, 28)">
    <!-- Base horizontal bar -->
    <rect x="0" y="72" width="96" height="4" fill="#FFFFFF"/>
    <!-- Left merlon -->
    <rect x="0" y="44" width="20" height="32" fill="#FFFFFF"/>
    <!-- Middle merlon -->
    <rect x="38" y="44" width="20" height="32" fill="#FFFFFF"/>
    <!-- Right merlon -->
    <rect x="76" y="44" width="20" height="32" fill="#FFFFFF"/>
    <!-- Gold accent line below mark -->
    <rect x="0" y="82" width="96" height="1.5" fill="#B8860B"/>
  </g>

  <!-- Vertical divider -->
  <line x1="148" y1="30" x2="148" y2="130" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <!-- FORT wordmark -->
  <text
    x="170"
    y="82"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="400"
    letter-spacing="12"
    fill="#FFFFFF"
  >FORT</text>

  <!-- PROPERTY DEVELOPMENT -->
  <text
    x="171"
    y="108"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5.5"
    fill="rgba(255,255,255,0.75)"
  >PROPERTY DEVELOPMENT</text>

  <!-- Gold underline accent under FORT -->
  <rect x="170" y="90" width="168" height="1" fill="#B8860B"/>
</svg>
